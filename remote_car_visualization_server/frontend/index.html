<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Telemetry 3D Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #telemetry-dashboard {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff00;
            background: rgba(0, 0, 0, 0.85);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #00ff00;
            pointer-events: none;
            min-width: 200px;
        }
        #telemetry-dashboard h3 {
            margin-top: 0;
            border-bottom: 1px solid #00ff00;
            padding-bottom: 5px;
        }
        .metric {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
        }
    </style>
</head>
<body>

    <div id="telemetry-dashboard">
        <h3>Telemetry (Euler Angles)</h3>
        <div class="metric"><span>Roll:</span> <span id="val-roll">0.00</span>°</div>
        <div class="metric"><span>Pitch:</span> <span id="val-pitch">0.00</span>°</div>
        <div class="metric"><span>Yaw:</span> <span id="val-yaw">0.00</span>°</div>
    </div>

    <script>
        // --- 1. THREE.JS SCENE CONFIGURATION ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Add ambient and directional lighting to give shapes depth and shading
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 7);
        scene.add(directionalLight);

        camera.position.set(4, 4, 6); // Position camera at an angle to see 3D depth
        camera.lookAt(0, 0, 0);

        // --- 2. PROCEDURAL 3D VEHICLE ASSEMBLY ---
        // Create a blank 3D group to hold all vehicle parts together as a single entity
        const carModel = new THREE.Group();

        carModel.rotation.reorder('YXZ'); // Prevents axis switching during complex rotations

        // Define shared materials
        const bodyMaterial = new THREE.MeshStandardMaterial({ color: 0x00ff00, wireframe: false }); // Green body
        const cabinMaterial = new THREE.MeshStandardMaterial({ color: 0x00aaff, wireframe: false }); // Blue windows/cabin
        const wheelMaterial = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 });  // Dark gray tires

        // Main chassis / lower body (Length: 3.0, Height: 0.6, Width: 1.6)
        const chassisGeom = new THREE.BoxGeometry(3.0, 0.6, 1.6);
        const chassis = new THREE.Mesh(chassisGeom, bodyMaterial);
        chassis.position.y = 0.3; // Elevate slightly above origin point
        carModel.add(chassis);

        // Cabin / upper body (Length: 1.6, Height: 0.6, Width: 1.4)
        const cabinGeom = new THREE.BoxGeometry(1.6, 0.6, 1.4);
        const cabin = new THREE.Mesh(cabinGeom, cabinMaterial);
        cabin.position.set(-0.2, 0.9, 0); // Positioned slightly backward and on top of chassis
        carModel.add(cabin);

        // Wheels blueprint (Radius: 0.4, Width: 0.3, Segments: 32)
        const wheelGeom = new THREE.CylinderGeometry(0.4, 0.4, 0.3, 32);
        // Rotate cylinder geometry once so it rolls forward natively
        wheelGeom.rotateX(Math.PI / 2);

        // Define relative wheel positions relative to car chassis [X (front/back), Z (left/right)]
        const wheelPositions = [
            { x: 1.0, z: 0.95 },   // Front Left
            { x: 1.0, z: -0.95 },  // Front Right
            { x: -1.0, z: 0.95 },  // Rear Left
            { x: -1.0, z: -0.95 }  // Rear Right
        ];

        // Instantiate and mount all four wheels to the car model
        wheelPositions.forEach(pos => {
            const wheel = new THREE.Mesh(wheelGeom, wheelMaterial);
            wheel.position.set(pos.x, 0.2, pos.z);
            carModel.add(wheel);
        });

        // Add the fully assembled vehicle group into the virtual world
        scene.add(carModel);

        // --- 3. ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.render(scene, camera);
        }
        animate();

        // --- 4. REAL-TIME WEBSOCKET NETWORKING ---
        const ws = new WebSocket('ws://localhost:8000/ws/telemetry');
        const rollText = document.getElementById('val-roll');
        const pitchText = document.getElementById('val-pitch');
        const yawText = document.getElementById('val-yaw');

        ws.onmessage = function(event) {
            const telemetry = JSON.parse(event.data);

            rollText.innerText = telemetry.roll.toFixed(2);
            pitchText.innerText = telemetry.pitch.toFixed(2);
            yawText.innerText = telemetry.yaw.toFixed(2);

            // Dynamically rotate the entire vehicle group based on live Euler constraints
            carModel.rotation.x = THREE.MathUtils.degToRad(telemetry.roll); // Roll -> X-axis
            carModel.rotation.y = THREE.MathUtils.degToRad(telemetry.yaw);   // Yaw   -> Y-axis
            carModel.rotation.z = THREE.MathUtils.degToRad(telemetry.pitch);  // Pitch  -> Z-axis
        };

        ws.onclose = function() {
            console.warn("Telemetry stream disconnected from backend server.");
            document.getElementById('telemetry-dashboard').style.borderColor = '#ff0000';
            document.getElementById('telemetry-dashboard').style.color = '#ff0000';
        };
    </script>
</body>
</html>
